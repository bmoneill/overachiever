<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Overachiever — Xbox Achievements</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background: #0e0e0e;
                color: #e0e0e0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .container {
                text-align: center;
                max-width: 480px;
                padding: 2rem;
            }
            h1 {
                font-size: 2.4rem;
                margin-bottom: 0.25rem;
                color: #107c10;
            }
            .subtitle {
                color: #888;
                margin-bottom: 2rem;
                font-size: 1rem;
            }
            form {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }
            label {
                font-size: 0.95rem;
                text-align: left;
                color: #bbb;
            }
            input[type="text"] {
                padding: 0.75rem 1rem;
                font-size: 1rem;
                border: 1px solid #333;
                border-radius: 6px;
                background: #1a1a1a;
                color: #e0e0e0;
                outline: none;
                transition: border-color 0.2s;
            }
            input[type="text"]:focus {
                border-color: #107c10;
            }
            button {
                padding: 0.75rem 1rem;
                font-size: 1rem;
                font-weight: 600;
                border: none;
                border-radius: 6px;
                background: #107c10;
                color: #fff;
                cursor: pointer;
                transition: background 0.2s;
            }
            button:hover {
                background: #0e6b0e;
            }
            .error {
                background: #3b1010;
                border: 1px solid #6b2020;
                color: #f5a0a0;
                padding: 0.75rem 1rem;
                border-radius: 6px;
                margin-bottom: 1rem;
                text-align: left;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🏆 Overachiever</h1>
            <p class="subtitle">Look up Xbox achievements by XUID</p>

            {% with messages = get_flashed_messages(with_categories=true) %} {%
            for category, message in messages %}
            <div class="error">{{ message }}</div>
            {% endfor %} {% endwith %}

            <form action="/" method="post">
                <label for="xuid">Xbox User ID (XUID)</label>
                <input
                    type="text"
                    id="xuid"
                    name="xuid"
                    placeholder="e.g. 2533274791234567"
                    required
                />
                <button type="submit">View Achievements</button>
            </form>
        </div>
    </body>
</html>
