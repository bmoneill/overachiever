<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Achievement Guides — Overachiever</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background: #0e0e0e;
                color: #e0e0e0;
                min-height: 100vh;
                padding: 2rem 1rem;
            }
            h1 {
                text-align: center;
                margin-bottom: 0.25rem;
                color: #107c10;
                font-size: 2rem;
            }
            .subtitle {
                text-align: center;
                color: #888;
                margin-bottom: 2rem;
                font-size: 1.05rem;
            }

            .games-grid {
                max-width: 900px;
                margin: 0 auto;
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 1rem;
            }
            .game-card {
                display: flex;
                align-items: center;
                gap: 1rem;
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                border-radius: 10px;
                padding: 1rem;
                text-decoration: none;
                color: #e0e0e0;
                transition:
                    background 0.2s,
                    border-color 0.2s;
            }
            .game-card:hover {
                background: #222;
                border-color: #107c10;
            }
            .game-info {
                flex: 1;
                min-width: 0;
            }
            .game-name-row {
                display: flex;
                align-items: center;
                gap: 0.4rem;
                margin-bottom: 0.35rem;
            }
            .platform-icon {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
                opacity: 0.7;
            }
            .game-name {
                font-weight: 600;
                font-size: 1rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .guide-count {
                font-size: 0.85rem;
                color: #aaa;
            }
            .no-results {
                text-align: center;
                color: #888;
                margin-top: 3rem;
                grid-column: 1 / -1;
            }
        </style>
    </head>
    <body>
        {% include '_navbar.html' %}

        <p class="subtitle">Achievement Guides</p>

        {% if games %}
        <div class="games-grid">
            {% for game in games %}
            <a
                class="game-card"
                href="{{ url_for('public_game_guides', platform=platform_slugs[game.platform_id], title_id=game.title_id) }}"
            >
                <div class="game-info">
                    <div class="game-name-row">
                        <img
                            class="platform-icon"
                            src="{{ url_for('static', filename=platform_slugs[game.platform_id] + '.svg') }}"
                            alt="{{ platform_slugs[game.platform_id] }}"
                        />
                        <div class="game-name" title="{{ game.game_name }}">
                            {{ game.game_name }}
                        </div>
                    </div>
                    <div class="guide-count">
                        {{ game.guide_count }} guide{{ 's' if game.guide_count
                        != 1 else '' }}
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <div class="games-grid">
            <p class="no-results">No guides have been submitted yet.</p>
        </div>
        {% endif %}
    </body>
</html>
