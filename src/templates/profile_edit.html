<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Edit Profile – Overachiever</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background: #0e0e0e;
                color: #e0e0e0;
                display: flex;
                justify-content: center;
                min-height: 100vh;
                padding: 2rem 1rem;
            }
            .container {
                max-width: 560px;
                width: 100%;
            }
            h1 {
                font-size: 2.4rem;
                margin-bottom: 0.25rem;
                color: #107c10;
                text-align: center;
            }
            .subtitle {
                color: #888;
                margin-bottom: 2rem;
                font-size: 1rem;
                text-align: center;
            }
            .section-title {
                font-size: 1.1rem;
                font-weight: 600;
                margin-bottom: 1rem;
                color: #bbb;
                border-bottom: 1px solid #333;
                padding-bottom: 0.5rem;
            }
            .card {
                background: #1a1a1a;
                border: 1px solid #333;
                border-radius: 8px;
                padding: 1.25rem;
                margin-bottom: 1rem;
            }
            .form-group {
                margin-bottom: 1rem;
            }
            .form-group label {
                display: block;
                font-size: 0.85rem;
                font-weight: 600;
                color: #aaa;
                margin-bottom: 0.4rem;
            }
            .form-group textarea {
                width: 100%;
                min-height: 120px;
                padding: 0.6rem 0.75rem;
                font-size: 0.9rem;
                font-family: inherit;
                background: #0e0e0e;
                border: 1px solid #444;
                border-radius: 6px;
                color: #e0e0e0;
                outline: none;
                resize: vertical;
                transition: border-color 0.2s;
            }
            .form-group textarea:focus {
                border-color: #107c10;
            }
            .checkbox-group {
                display: flex;
                align-items: center;
                gap: 0.6rem;
                margin-bottom: 1rem;
            }
            .checkbox-group input[type="checkbox"] {
                width: 18px;
                height: 18px;
                accent-color: #107c10;
                cursor: pointer;
            }
            .checkbox-group label {
                font-size: 0.9rem;
                color: #ccc;
                cursor: pointer;
            }
            .btn {
                display: inline-block;
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
                font-weight: 600;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                text-decoration: none;
                text-align: center;
                transition:
                    background 0.2s,
                    opacity 0.2s;
            }
            .btn-green {
                background: #107c10;
                color: #fff;
            }
            .btn-green:hover {
                background: #0e6b0e;
            }
            .btn-outline {
                background: transparent;
                color: #107c10;
                border: 1px solid #107c10;
            }
            .btn-outline:hover {
                background: rgba(16, 124, 16, 0.1);
            }
            .edit-actions {
                display: flex;
                gap: 0.75rem;
                justify-content: flex-end;
            }
            .error {
                background: #3b1010;
                border: 1px solid #6b2020;
                color: #f5a0a0;
                padding: 0.75rem 1rem;
                border-radius: 6px;
                margin-bottom: 1rem;
            }
            .success {
                background: #0a2e0a;
                border: 1px solid #107c10;
                color: #6fcf6f;
                padding: 0.75rem 1rem;
                border-radius: 6px;
                margin-bottom: 1rem;
            }
            .back-link {
                display: block;
                text-align: center;
                margin-top: 2rem;
                font-size: 0.9rem;
                color: #107c10;
                text-decoration: none;
            }
            .back-link:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="container">
            {% include '_navbar.html' %}
            <p class="subtitle">Edit Profile</p>

            {% with messages = get_flashed_messages(with_categories=true) %} {%
            for category, message in messages %}
            <div class="{{ category }}">{{ message }}</div>
            {% endfor %} {% endwith %}

            <h2 class="section-title">Edit Profile</h2>

            <form
                method="POST"
                action="{{ url_for('profile_edit', username=target_user.username) }}"
            >
                <div class="card">
                    <div class="form-group">
                        <label for="bio">Bio</label>
                        <textarea
                            id="bio"
                            name="bio"
                            placeholder="Tell people about yourself…"
                            maxlength="500"
                        >
{{ target_user.bio or '' }}</textarea
                        >
                    </div>

                    <div class="checkbox-group">
                        <input
                            type="checkbox"
                            id="display_gamertags"
                            name="display_gamertags"
                            {%
                            if
                            target_user.display_gamertags
                            %}checked{%
                            endif
                            %}
                        />
                        <label for="display_gamertags"
                            >Show linked gamertags on my profile</label
                        >
                    </div>
                </div>

                <div class="edit-actions">
                    <a
                        class="btn btn-outline"
                        href="{{ url_for('profile', username=target_user.username) }}"
                        >Cancel</a
                    >
                    <button class="btn btn-green" type="submit">
                        Save Changes
                    </button>
                </div>
            </form>

            <a
                class="back-link"
                href="{{ url_for('profile', username=target_user.username) }}"
                >← Back to Profile</a
            >
        </div>
    </body>
</html>
