<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Overachiever</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0e0e0e; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; max-width: 480px; padding: 2rem; }
        h1 { font-size: 2.4rem; margin-bottom: 0.25rem; color: #107c10; }
        .subtitle { color: #888; margin-bottom: 2rem; font-size: 1rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        label { font-size: 0.95rem; text-align: left; color: #bbb; }
        input { padding: 0.75rem 1rem; font-size: 1rem; border: 1px solid #333; border-radius: 6px; background: #1a1a1a; color: #e0e0e0; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #107c10; }
        button { padding: 0.75rem 1rem; font-size: 1rem; font-weight: 600; border: none; border-radius: 6px; background: #107c10; color: #fff; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0e6b0e; }
        .error { background: #3b1010; border: 1px solid #6b2020; color: #f5a0a0; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; text-align: left; }
        .alt-link { margin-top: 1.5rem; font-size: 0.9rem; color: #888; }
        .alt-link a { color: #107c10; text-decoration: none; }
        .alt-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Overachiever</h1>
        <p class="subtitle">Create your account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}{% for category, message in messages %}<div class="error">{{ message }}</div>{% endfor %}{% endwith %}

        <form method="POST" action="{{ url_for('register') }}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Username">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Email">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Password">

            <label for="xuid">Xbox User ID (XUID)</label>
            <input type="text" id="xuid" name="xuid" required placeholder="Xbox User ID (XUID), e.g. 2533274791234567">

            <button type="submit">Create Account</button>
        </form>

        <p class="alt-link">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
</body>
</html>
